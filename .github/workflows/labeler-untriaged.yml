name: "Labels: Untriaged"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  add_label:
    runs-on: [self-hosted]
    steps:
    - uses: actions-ecosystem/action-add-labels@v1
      if: ${{ github.event_name == 'issues' && join(github.event.issue.labels) == '' }}
      with:
        github_token: ${{ secrets.BOT_TOKEN }}
        labels: "S: Untriaged"
