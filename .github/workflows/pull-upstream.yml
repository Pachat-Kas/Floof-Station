name: Pull Upstream

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      UPSTREAM_URL: https://github.com/space-wizards/space-station-14.git

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Configure upstream
      run: |
        git remote add upstream "$UPSTREAM_URL" || true
        git fetch --depth=1 upstream master

    - name: Push updates
      run: |
        git push --force \
          https://x-access-token:${{ secrets.BOT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git \
          refs/remotes/upstream/master:refs/heads/upstream
