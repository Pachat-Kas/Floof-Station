name: Pull Upstream

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      UPSTREAM_URL: https://github.com/space-wizards/space-station-14.git

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Configure upstream
      run: |
        git remote add upstream "$UPSTREAM_URL" || true
        git fetch --unshallow upstream master

    - name: Push updates
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        git remote set-url origin https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git push --force origin refs/remotes/upstream/master:refs/heads/upstream
