name: Pull Upstream

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repo with PAT (fully controlled auth)
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        git clone --depth=1 https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git repo

    - name: Fetch upstream
      working-directory: repo
      run: |
        git remote add upstream https://github.com/space-wizards/space-station-14.git
        git fetch --depth=1 upstream master

    - name: Force push using PAT (no GitHub App context anywhere)
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      working-directory: repo
      run: |
        git push --force \
          https://x-access-token:${BOT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git \
          refs/remotes/upstream/master:refs/heads/upstream
