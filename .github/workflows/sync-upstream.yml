name: Daily Upstream Sync

on:
  schedule:
    - cron: "0 3 * * *"  # every day at 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "Floof-Station-Bot"
          git config user.email "pachat.kas+bot@gmail.com"

      - name: Create sync branch
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH

      - name: Merge upstream into sync branch
        run: |
          git merge upstream/master --no-edit

      - name: Push sync branch
        run: |
          git push origin $BRANCH

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ env.BRANCH }}
          destination_branch: master
          pr_title: "Daily upstream sync (${{ env.BRANCH }})"
          pr_body: "Automated merge of upstream changes into master."
