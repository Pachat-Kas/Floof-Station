name: Daily Upstream Sync

on:
  schedule:
    - cron: "0 3 * * *"  # every day at 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Configure git
        run: |
          git fetch origin upstream --depth=100
          git branch upstream origin/upstream

      - name: Configure git
        run: |
          git config user.name "Floof-Station-Bot"
          git config user.email "pachat.kas+bot@gmail.com"

      - name: Create sync branch
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b $BRANCH origin/upstream

      - name: Push sync branch
        run: |
          git push origin $BRANCH --force

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Daily Upstream Sync (${{ env.BRANCH }})",
              head:  "${{ env.BRANCH }}",
              base: "master",
              body: "Automated merge of upstream changes into master."
            });
