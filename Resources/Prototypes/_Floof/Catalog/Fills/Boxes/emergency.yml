- type: entity
  parent: BoxSurvival
  id: BoxSurvivalWater
  suffix: Standard H2O
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreath
        - id: EmergencyTankWaterVaporFilled
        - id: EmergencyMedipen
        - id: Flare
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank
  - type: Label
    localizedLabel: reagent-name-water

