- type: entity
  id: StripperPolePlatform
  parent: BaseStructure
  name: stripper pole pedestal
  description: Holds the pole that allows you to show off your great "assets"
  suffix: Floof
  components:
  - type: Transform
    anchored: true
  - type: Construction
    graph: Lewd
    node: FurnStripPole
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 120
        hard: "false"
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Sprite
    sprite: _Floof/Structures/pole.rsi
    state: stand
    offset: 0, 0.15
    drawdepth: SmallMobs
  - type: Icon
    sprite: _Floof/Structures/pole.rsi
    state: icon
  - type: Injurable
  - type: Damageable
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ChildEntities
    childPrototypes:
    - prototype: StripperPole

- type: entity
  id: StripperPole
  categories: [ HideSpawnMenu ]
  parent: BaseStructure
  name: stripper pole
  description: A long pole on a pedestal used for showing off your great 'assets'.
  components:
  - type: Transform
    anchored: true
  - type: Construction
    graph: Lewd
    node: FurnStripPole
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.05,-0.15,0.05,0.025"
        density: 120
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: Sprite
    sprite: _Floof/Structures/pole.rsi
    state: pole
    drawdepth: Mobs
    offset: 0, 0.15
  - type: Icon
    sprite: _Floof/Structures/pole.rsi
    state: icon
  - type: Injurable
  - type: Damageable
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  id: StripperPoleInit
  parent: BaseStructure
  categories: [ HideSpawnMenu ]
  name: stripper pole base
  description: The base of a stripper pole.
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: Sprite
    sprite: _Floof/Structures/pole.rsi
    state: pole_base
    offset: 0, 0.15
    drawdepth: SmallObjects
  - type: Icon
    sprite: _Floof/Structures/pole.rsi
    state: icon
  - type: Construction
    graph: Lewd
    node: FurnStripPoleInit
  - type: Injurable
  - type: Damageable
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 125
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
