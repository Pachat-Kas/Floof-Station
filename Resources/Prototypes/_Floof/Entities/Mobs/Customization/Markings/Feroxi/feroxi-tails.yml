# FINS #
- type: marking
  id: MarkingDorsalFeroxi
  bodyPart: Chest
  groupWhitelist: [ Feroxi ]
  sprites:
  - sprite: _DeltaV/Mobs/Customization/Feroxi/tail_markings.rsi
    state: feroxi-dorsal
  - sprite: _DeltaV/Mobs/Customization/Feroxi/tail_markings.rsi
    state: feroxi-dorsal-tip

- type: marking
  id: MarkingDorsalStripedFeroxi
  bodyPart: Chest
  groupWhitelist: [ Feroxi ]
  coloring:
    default:
      type:
        !type:SkinColoring
    layers:
      feroxi-dorsal-stripes:
        type:
          !type:SimpleColoring
          color: "#FFFFFF"
  sprites:
  - sprite: _DeltaV/Mobs/Customization/Feroxi/tail_markings.rsi
    state: feroxi-dorsal
  - sprite: _DeltaV/Mobs/Customization/Feroxi/tail_markings.rsi
    state: feroxi-dorsal-stripes
  - sprite: _DeltaV/Mobs/Customization/Feroxi/tail_markings.rsi
    state: feroxi-dorsal-tip


