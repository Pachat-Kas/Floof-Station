# BASE #
- type: entity
  parent: OrganBaseOrganic
  id: OrganFeroxi
  abstract: true
  suffix: Floof, Feroxi

- type: entity
  id: OrganFeroxiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ MetabolizerFeroxi ]

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _DeltaV/Mobs/Species/Feroxi/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _DeltaV/Mobs/Species/Feroxi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Feroxi


# PARTS #
- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganFeroxiExternal ]
  id: OrganFeroxiTorso
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Tail

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganFeroxiExternal ]
  id: OrganFeroxiHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide

- type: entity
  parent: [ OrganBaseArmLeft, OrganFeroxiExternal ]
  id: OrganFeroxiArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganFeroxiExternal ]
  id: OrganFeroxiArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganFeroxiExternal ]
  id: OrganFeroxiHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganFeroxiExternal ]
  id: OrganFeroxiHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganFeroxiExternal ]
  id: OrganFeroxiLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganFeroxiExternal ]
  id: OrganFeroxiLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganFeroxiExternal ]
  id: OrganFeroxiFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganFeroxiExternal ]
  id: OrganFeroxiFootRight


# ORGANS #
- type: entity
  parent: [ OrganBaseBrain, OrganSpriteHumanInternal, OrganFeroxiInternal ]
  id: OrganFeroxiBrain

- type: entity
  parent: [ OrganBaseEyes, OrganFeroxiInternal, OrganFeroxiExternal ]
  id: OrganFeroxiEyes
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Customization/eyes.rsi

- type: entity
  parent: [ OrganBaseTongue, OrganFeroxiInternal ]
  id: OrganFeroxiTongue

- type: entity
  parent: [ OrganBaseAppendix, OrganSpriteHumanInternal, OrganFeroxiInternal ]
  id: OrganFeroxiAppendix

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal, OrganFeroxiInternal ]
  id: OrganFeroxiEars

- type: entity
  parent: [ OrganBaseLungs, OrganFeroxiInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiLungs
  name: feroxi lungs and gills

- type: entity
  parent: [ OrganBaseHeart, OrganFeroxiInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiHeart

- type: entity
  parent: [ OrganBaseStomach, OrganFeroxiInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiStomach
  components:
  - type: Stomach
    specialDigestible:
      tags:
      - TagFeroxiFood
      - Meat
      - Pill
      - Crayon
      - Paper

- type: entity
  parent: [ OrganBaseLiver, OrganSpriteHumanInternal, OrganFeroxiInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiLiver

- type: entity
  parent: [ OrganBaseKidneys, OrganSpriteHumanInternal, OrganFeroxiInternal, OrganFeroxiMetabolizer ]
  id: OrganFeroxiKidneys
