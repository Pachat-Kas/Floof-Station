# Feroxi Meat
- type: constructionGraph
  id: ConstructionGraphFeroxiSteak
  start: start
  graph:
  - node: start
    edges:
    - to: feroxi steak
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 345
  - node: feroxi steak
    entity: FoodMeatFeroxiCooked

